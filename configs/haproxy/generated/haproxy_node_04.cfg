global
    log stdout format raw local0
    maxconn 20000
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    daemon

    # Buffer and TCP Performance Tuning for XHTTP Streams
    tune.bufsize 65536
    tune.maxrewrite 8192
    tune.h2.initial-window-size 2147483647
    tune.quic.fe.max-idle-timeout 60000

    # Modern Security Ciphers
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    
    # Smart Multiplexing & Splicing for High-Throughput Tunnels
    option tcp-smart-connect
    option tcp-smart-accept
    no option http-buffer-request
    
    timeout connect 5s
    timeout client 600s
    timeout server 600s
    timeout tunnel 1h

# ---------------------------------------------------------------------
# FRONTEND: HTTP (Port 80)
# ---------------------------------------------------------------------
frontend main_http
    bind :::80 v4v6
    mode http

    # Dynamic Redirect to HTTPS except for reverse tunnels that bypass SSL
    http-request redirect scheme https if !{ ssl_fc }

# ---------------------------------------------------------------------
# FRONTEND: HTTPS & QUIC / HTTP/3 (Port 443)
# ---------------------------------------------------------------------
frontend main_https
    bind :::443 v4v6 ssl crt /etc/ssl/private/selfsigned.pem crt /etc/ssl/private/ehraz.pem alpn h2,http/1.1
    mode http
    
    # HTTP/3 QUIC Bindings for modern low-latency clients
    bind quic4@:443 ssl crt /etc/ssl/private/selfsigned.pem crt /etc/ssl/private/ehraz.pem alpn h3
    bind quic6@:443 ssl crt /etc/ssl/private/selfsigned.pem crt /etc/ssl/private/ehraz.pem alpn h3
    http-response set-header Alt-Svc "h3=\":443\"; ma=31536000"

    option forwardfor
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host %[hdr(host)]
    http-request set-header X-Forwarded-Port 443

    # --- Static Unbreakable Admin Tunnels ---
    use_backend bk_mmd_pg_us if { path_beg /mmd-pg-us }
    use_backend bk_mmd_pg if { path_beg /mmd-pg }
    use_backend bk_mmd_pg_de if { path_beg /mmd-pg-de }

    # --- Subdomain Panel / Service Routing ---

    acl is_tech_new_state_ir hdr(host) -i tech.new-state.ir
    use_backend bk_tech_new_state_ir if is_tech_new_state_ir
    acl is_dash_new_state_ir hdr(host) -i dash.new-state.ir
    use_backend bk_dash_new_state_ir if is_dash_new_state_ir
    acl is_panel_new_state_ir hdr(host) -i panel.new-state.ir
    use_backend bk_panel_new_state_ir if is_panel_new_state_ir
    acl is_headscale_menudigi_ir hdr(host) -i headscale.menudigi.ir
    use_backend bk_headscale_menudigi_ir if is_headscale_menudigi_ir
    acl is_pma_menudigi_ir hdr(host) -i pma.menudigi.ir
    use_backend bk_pma_menudigi_ir if is_pma_menudigi_ir
    acl is_dash_menudigi_ir hdr(host) -i dash.menudigi.ir
    use_backend bk_dash_menudigi_ir if is_dash_menudigi_ir
    acl is_sub_menudigi_ir hdr(host) -i sub.menudigi.ir
    use_backend bk_sub_menudigi_ir if is_sub_menudigi_ir
    acl is_tech_menudigi_ir hdr(host) -i tech.menudigi.ir
    use_backend bk_tech_menudigi_ir if is_tech_menudigi_ir

    # --- Dynamic Combinatorial Path Routing (Radix Tree Match) ---
