global
    log stdout format raw local0
    maxconn 20000
    stats socket /var/run/haproxy.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    daemon

    # Buffer and TCP Performance Tuning for XHTTP Streams
    tune.bufsize 65536
    tune.maxrewrite 8192
    tune.h2.initial-window-size 2147483647

    # Modern Security Ciphers
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option forwardfor
    
    # Smart Multiplexing & Splicing for High-Throughput Tunnels
    option tcp-smart-connect
    option tcp-smart-accept
    no option http-buffer-request
    
    timeout connect 5s
    timeout client 600s
    timeout server 600s
    timeout tunnel 1h

# ---------------------------------------------------------------------
# FRONTEND: HTTP (Port 80)
# ---------------------------------------------------------------------
frontend main_http
    bind :::80 v4v6
    mode http
    http-request redirect scheme https code 301 unless { ssl_fc }

# ---------------------------------------------------------------------
# FRONTEND: HTTPS (Port 443 - Native SSL Aligned)
# ---------------------------------------------------------------------
frontend incoming_https
    bind :::443 v4v6 ssl crt /opt/node/certs/ssl_bundle.pem alpn h2,http/1.1
    mode http
    
    option forwardfor
    http-request set-header X-Forwarded-Proto https
    http-request set-header X-Forwarded-Host %[hdr(host)]
    http-request set-header X-Forwarded-Port 443

    # Healthcheck endpoint
    acl is_health_check path_beg /healthcheck
    http-request return status 200 content-type "text/plain" string "OK_NEW" if is_health_check

    # --- Static Unbreakable Admin Tunnels ---
    use_backend bk_mmd_pg_us if { path_beg /mmd-pg-us }
    use_backend bk_mmd_pg if { path_beg /mmd-pg }
    use_backend bk_mmd_pg_de if { path_beg /mmd-pg-de }

    # --- Subdomain Panel / Service Routing ---
    acl is_tech_new_state_ir hdr(host) -i tech.new-state.ir
    use_backend bk_tech_new_state_ir if is_tech_new_state_ir
    acl is_dash_new_state_ir hdr(host) -i dash.new-state.ir
    use_backend bk_dash_new_state_ir if is_dash_new_state_ir
    acl is_panel_new_state_ir hdr(host) -i panel.new-state.ir
    use_backend bk_panel_new_state_ir if is_panel_new_state_ir
    acl is_headscale_menudigi_ir hdr(host) -i headscale.menudigi.ir
    use_backend bk_headscale_menudigi_ir if is_headscale_menudigi_ir
    acl is_pma_menudigi_ir hdr(host) -i pma.menudigi.ir
    use_backend bk_pma_menudigi_ir if is_pma_menudigi_ir
    acl is_dash_menudigi_ir hdr(host) -i dash.menudigi.ir
    use_backend bk_dash_menudigi_ir if is_dash_menudigi_ir
    acl is_sub_menudigi_ir hdr(host) -i sub.menudigi.ir
    use_backend bk_sub_menudigi_ir if is_sub_menudigi_ir
    acl is_tech_menudigi_ir hdr(host) -i tech.menudigi.ir
    use_backend bk_tech_menudigi_ir if is_tech_menudigi_ir

    # --- Dynamic Combinatorial Path Routing (Map-based Radix Match) ---
    # 1. Parse path patterns (Unquoted for HAProxy compatibility)
    acl is_xtls path -m reg ^/[0-9]{2}[-/][0-9]{2}[-/][0-9]{2}[-/][0-9]{2}/xtls(/|$)
    acl is_reverse path -m reg ^/[0-9]{2}[-/][0-9]{2}[-/][0-9]{2}[-/][0-9]{2}(/|$)

    # 2. Extract inside_server_id segment
    http-request set-var(txn.inside_id) path,field(2,/),field(3,-) if { path -m reg ^/[0-9]{2}-[0-9]{2}-[0-9]{2}-[0-9]{2} }
    http-request set-var(txn.inside_id) path,field(4,/) if { path -m reg ^/[0-9]{2}/[0-9]{2}/[0-9]{2}/[0-9]{2} }

    # 3. Look up target server's WireGuard IP
    http-request set-var(txn.target_ip) var(txn.inside_id),map(/etc/haproxy/inside_servers.map)

    # 4. Check if target is local to this node
    acl is_local var(txn.inside_id) -m str 01

    # 5. Dynamic routing logic (Split statements to avoid logical operator parsing errors)
    use_backend bk_local_xtls if is_xtls is_local
    use_backend bk_local_reverse if is_reverse !is_xtls is_local
    use_backend bk_remote_mesh if is_xtls !is_local
    use_backend bk_remote_mesh if is_reverse !is_xtls !is_local

    # Fallback to local default resolver / doh backend
    default_backend bk_fallback

# ===================================================================
# BACKENDS: STATICS & SUBDOMAINS
# ===================================================================
backend bk_fallback
    mode http
    http-request deny deny_status 404

backend bk_mmd_pg_us
    mode http
    server srv_mmd_pg_us 127.0.0.1:9443 proto h2

backend bk_mmd_pg
    mode http
    server srv_mmd_pg 127.0.0.1:8443

backend bk_mmd_pg_de
    mode http
    server srv_mmd_pg_de 127.0.0.1:4443

backend bk_tech_new_state_ir
    mode http
    server srv_tech_new_state_ir 127.0.0.1:5380

backend bk_dash_new_state_ir
    mode http
    server srv_dash_new_state_ir 127.0.0.1:8002

backend bk_panel_new_state_ir
    mode http
    server srv_panel_new_state_ir 127.0.0.1:2020

backend bk_headscale_menudigi_ir
    mode http
    server srv_headscale_menudigi_ir 127.0.0.1:8081

backend bk_pma_menudigi_ir
    mode http
    server srv_pma_menudigi_ir 127.0.0.1:8080

backend bk_dash_menudigi_ir
    mode http
    server srv_dash_menudigi_ir 127.0.0.1:2020

backend bk_sub_menudigi_ir
    mode http
    server srv_sub_menudigi_ir 127.0.0.1:2020

backend bk_tech_menudigi_ir
    mode http
    server srv_tech_menudigi_ir 127.0.0.1:5380


# ===================================================================
# BACKENDS: DYNAMIC CDN-STYLE ROUTING (Shared/Local for Node 01)
# ===================================================================
backend bk_local_xtls
    mode http
    # Rewrite original scenarios (e.g. /05-01-03-01/xtls/session) to unified loopback path preserving sub-paths
    http-request set-path %[path,regsub(^/[0-9]{2}[-/][0-9]{2}[-/][0-9]{2}[-/][0-9]{2}/xtls,/xtls)]
    server local_xray_xtls 127.0.0.1:20001

backend bk_local_reverse
    mode http
    # Rewrite original reverse tunnels (e.g. /05-01-03-01/session) to unified loopback path preserving sub-paths
    http-request set-path %[path,regsub(^/[0-9]{2}[-/][0-9]{2}[-/][0-9]{2}[-/][0-9]{2},/reverse)]
    server local_xray_reverse 127.0.0.1:10001

backend bk_remote_mesh
    mode http
    # Dynamically target the resolved WireGuard IP of the peer node
    http-request set-dst var(txn.target_ip)
    # Target peer's HAProxy HTTPS port 443 over WireGuard secure network
    http-request set-dst-port int(443)
    server remote_haproxy 0.0.0.0:443 ssl verify none


